# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Run Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-core:
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
    - name: Install Hatch
      uses: pypa/hatch@install
    - name: Lint with ruff
      run: |
        hatch run lint:check
    - name: Test with hatch
      run: |
        hatch run +py=${{ matrix.python-version }} test:test-with-cov

  test-pytorch:
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    - name: Cache Hugging Face and Torch models
      uses: actions/cache@v3
      with:
        path: |
          ~/.cache/huggingface
          ~/.cache/torch
        key: ${{ runner.os }}-models-${{ hashFiles('tests/pytorch/test_pytorch.py') }}
        restore-keys: |
          ${{ runner.os }}-models-
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
    - name: Install Hatch
      uses: pypa/hatch@install
    - name: Test pytorch export
      run: |
        hatch run +py=${{ matrix.python-version }} test-pytorch:pytest -vv tests/pytorch/
